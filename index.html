    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium VIP Telegram</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #050505; /* Deep dark background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🌟 Main Background Dark Yellow Pulse Animation */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(184, 134, 11, 0.25) 0%, transparent 70%); /* Dark Yellow / Gold */
            z-index: -1;
            animation: dark-pulse 3s infinite alternate ease-in-out;
        }

        @keyframes dark-pulse {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 30px 20px;
            text-align: center;
            z-index: 1;
        }

        /* 🌟 Profile Image Pop-Up Animation Styles */
        .profile-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffaa00;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.6);
        }

        /* Ripple / Pop-out Effect */
        .profile-popup {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: transparent;
            border: 2px solid #ffaa00;
            z-index: 5;
            animation: pop-out 1.5s infinite ease-out;
        }

        .profile-popup-2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: transparent;
            border: 2px solid #ffaa00;
            z-index: 5;
            animation: pop-out 1.5s infinite ease-out;
            animation-delay: 0.75s; /* Thoda delay takki double wave aaye */
        }

        @keyframes pop-out {
            0% { transform: scale(1); opacity: 0.8; border-width: 3px; }
            100% { transform: scale(1.5); opacity: 0; border-width: 1px; }
        }

        /* Text Styles */
        .name {
            color: #ffaa00;
            font-size: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 26px;
            line-height: 1.2;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        p.subheading {
            font-size: 14px;
            color: #cccccc;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Button Styles */
        .button-wrapper {
            border: 2px dotted rgba(255, 170, 0, 0.7);
            border-radius: 40px;
            padding: 6px;
            margin: 0 auto 15px auto;
            width: 90%;
            animation: border-pulse 1.5s infinite alternate;
        }

        @keyframes border-pulse {
            0% { border-color: rgba(255, 170, 0, 0.3); }
            100% { border-color: rgba(255, 170, 0, 1); }
        }

        .telegram-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(90deg, #ffcc00, #ff8c00);
            color: #000000;
            text-decoration: none;
            padding: 15px;
            border-radius: 35px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .telegram-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.8);
        }

        .click-here {
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 30px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(6px); }
        }

        /* Timer Styles */
        .timer-box {
            background-color: #111111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
        }

        .time-unit {
            text-align: center;
            width: 25%;
        }

        .number {
            color: #ffaa00;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        .label {
            color: #888888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .colon {
            color: #ffaa00;
            font-size: 24px;
            font-weight: bold;
            margin-top: -15px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile-container">
            <div class="profile-popup"></div>
            <div class="profile-popup-2"></div>
            
            <img src="https://i.ibb.co/Q3gvt7L7/IMG-20260414-WA0023.jpg" alt="Profile" class="profile-img">
        </div>
        
        <div class="name">𝐕𝐚𝐬𝐡𝐮 𝐁𝐡𝐚𝐢 🤑</div>

        <h1>RECOVER ALL YOUR LOSSES<br>GET 95% ACCURATE SHOTS 🔥</h1>
        
        <p class="subheading">Premium tips & exclusive picks — straight to your Telegram.</p>

        <div class="button-wrapper">
            <a href="https://t.me/+ptlQd9C9W2RlOTll" class="telegram-btn">
                ✈️ JOIN FREE TELEGRAM
            </a>
        </div>
        
        <div class="click-here">
            👇 CLICK HERE TO JOIN 👇
        </div>

        <div class="timer-box">
            <div class="time-unit">
                <div class="number" id="days">00</div>
                <div class="label">Days</div>
            </div>
            <div class="colon">:</div>
            <div class="time-unit">
                <div class="number" id="hours">24</div>
                <div class="label">Hours</div>
            </div>
            <div class="colon">:</div>
            <div class="time-unit">
                <div class="number" id="minutes">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="colon">:</div>
            <div class="time-unit">
                <div class="number" id="seconds">00</div>
                <div class="label">Seconds</div>
            </div>
        </div>

    </div>

    <script>
        // Set timer for 24 hours (24 hours * 60 mins * 60 secs)
        let totalSeconds = 24 * 60 * 60;

        function updateTimer() {
            let h = Math.floor(totalSeconds / 3600);
            let m = Math.floor((totalSeconds % 3600) / 60);
            let s = totalSeconds % 60;

            // Adding leading zero if number is less than 10
            document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
            document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
            document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;

            if (totalSeconds > 0) {
                totalSeconds--;
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
